<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Assessment - JobReady</title>

<link rel="shortcut icon" href="{{ url_for('static', filename='assets/logo.jpg') }}" type="image/x-icon">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header class="navbar">

<div class="nav-left">
<img src="{{ url_for('static', filename='assets/logo.jpg') }}" alt="JobReady Logo" class="logo"> <!-- LOGO PLACEHOLDER -->
<h1 class="brand">Job<span>Ready</span></h1>
</div>
<nav class="nav-links">
<a href="/">Home</a>
<a href="/profile">Profile</a>
</nav>

</header>

<section class="assessment-section">

<h2>Career Skill Assessment</h2>

<p>Answer the questions to evaluate your readiness</p>

<!-- PROGRESS -->

<div class="progress-area">

<p id="progress-text">Questions 1 of 10</p>

<div class="progress-bar">
<div class="progress" id="progress-bar-fill" style="width: 0%"></div>
</div>

</div>

<!-- QUESTION -->

<div class="question-area">

<h3 id="question-category" style="color: #666; font-size: 0.9rem; margin-bottom: 5px;">Category</h3>
<h3 id="question-text">Loading question...</h3>

<div id="options-container" style="margin-top: 20px;">
    <!-- Options will be loaded here dynamically -->
</div>

<textarea id="user-response" placeholder="Type your answer here..." style="display: none; width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;"></textarea>

</div>

<!-- TIP BOX -->

<div class="tip-box">

<h4>Tip</h4>

<p>Answer honestly to get accurate career recommendation</p>

</div>

<!-- NAVIGATION BUTTONS -->

<div class="question-nav">

<button class="secondary-btn" id="back-btn">
Back
</button>

<button class="primary-btn" id="next-btn">
Next Question
</button>

</div>

<script>
let currentQuestionIndex = 0;
let totalQuestions = 25;
let answers = {};

// Load the first question when the page loads
document.addEventListener('DOMContentLoaded', function() {
    loadCurrentQuestion();
    
    // Add event listener to next button
    document.getElementById('next-btn').addEventListener('click', function() {
        let answer = '';
        const options = document.getElementsByName('option');
        if (options.length > 0) {
            // MCQ question
            for (const option of options) {
                if (option.checked) {
                    answer = option.value;
                    break;
                }
            }
        } else {
            // Fallback for text input if used
            answer = document.getElementById('user-response').value.trim();
        }

        if (answer === '') {
            alert('Please select an answer before proceeding.');
            return;
        }
        answers[currentQuestionIndex] = answer;
        goToNextQuestion();
    });
    
    // Add event listener to back button
    document.getElementById('back-btn').addEventListener('click', function() {
        goToPreviousQuestion();
    });
});

function loadCurrentQuestion() {
    fetch("{{ url_for('assessment.get_current_question') }}")
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            if (data.error) {
                alert('Error loading question: ' + data.error);
                return;
            }
            if (data.finished) {
                window.location.href = "{{ url_for('pages.analyzing') }}";
                return;
            }
            currentQuestionIndex = data.current - 1;
            totalQuestions = data.total;
            
            document.getElementById('question-category').textContent = data.question.category || 'General';
            document.getElementById('question-text').textContent = data.question.text;
            document.getElementById('progress-text').textContent = `Questions ${data.current} of ${data.total}`;
            
            // Handle Options (MCQ)
            const optionsContainer = document.getElementById('options-container');
            const textArea = document.getElementById('user-response');
            optionsContainer.innerHTML = '';
            
            if (data.question.options && data.question.options.length > 0) {
                textArea.style.display = 'none';
                optionsContainer.style.display = 'block';
                
                data.question.options.forEach((option, index) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option-item';
                    optionDiv.style.margin = '10px 0';
                    optionDiv.style.padding = '10px';
                    optionDiv.style.border = '1px solid #eee';
                    optionDiv.style.borderRadius = '5px';
                    optionDiv.style.cursor = 'pointer';
                    optionDiv.style.display = 'flex';
                    optionDiv.style.alignItems = 'center';
                    
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'option';
                    radio.id = 'opt-' + index;
                    radio.value = option;
                    radio.style.marginRight = '12px';
                    radio.style.cursor = 'pointer';
                    
                    // Restore saved answer
                    if (answers[currentQuestionIndex] === option) {
                        radio.checked = true;
                    }
                    
                    const label = document.createElement('label');
                    label.htmlFor = 'opt-' + index;
                    label.textContent = option;
                    label.style.cursor = 'pointer';
                    label.style.flex = '1';
                    label.style.display = 'block';
                    label.style.margin = '0';
                    
                    optionDiv.appendChild(radio);
                    optionDiv.appendChild(label);
                    
                    // Click on div selects radio
                    optionDiv.onclick = () => {
                        radio.checked = true;
                    };
                    
                    optionsContainer.appendChild(optionDiv);
                });
            } else {
                // Fallback to text area if no options
                optionsContainer.style.display = 'none';
                textArea.style.display = 'block';
                textArea.value = answers[currentQuestionIndex] || '';
            }
            
            // Update progress bar
            const progressPercent = (data.current / data.total) * 100;
            document.getElementById('progress-bar-fill').style.width = progressPercent + '%';
            
            // Update button states
            document.getElementById('back-btn').disabled = currentQuestionIndex === 0;
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error loading question. Please make sure you are logged in.');
        });
}

function goToNextQuestion() {
    let answer = '';
    const options = document.getElementsByName('option');
    if (options.length > 0) {
        for (const option of options) {
            if (option.checked) {
                answer = option.value;
                break;
            }
        }
    } else {
        answer = document.getElementById('user-response').value.trim();
    }
    
    fetch("{{ url_for('assessment.next_question') }}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ answer: answer })
    })
    .then(response => response.json())
    .then(data => {
        if (!data.success) {
            alert('Error moving to next question');
            return;
        }
        
        if (data.finished) {
            // All questions answered - submit and redirect
            submitAssessment();
        } else {
            // Load next question
            loadCurrentQuestion();
            window.scrollTo(0, 0);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Error moving to next question');
    });
}

function submitAssessment() {
    // Show loading or redirect to analyzing page immediately
    window.location.href = "{{ url_for('pages.analyzing') }}";
    
    // In the background or on the analyzing page, the submission happens
    fetch("{{ url_for('assessment.submit') }}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        }
    })
    .then(response => response.json())
    .then(data => {
        console.log('Assessment submitted:', data);
    })
    .catch(error => {
        console.error('Error submitting assessment:', error);
    });
}

function goToPreviousQuestion() {
    const answer = document.getElementById('user-response').value.trim();
    if (answer) {
        answers[currentQuestionIndex] = answer;
    }
    
    fetch("{{ url_for('assessment.previous_question') }}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({})
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
            return;
        }
        
        if (data.success) {
            loadCurrentQuestion();
            window.scrollTo(0, 0);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Error moving to previous question');
    });
}
</script>

</section>

</body>
</html>
